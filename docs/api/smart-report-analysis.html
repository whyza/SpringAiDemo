\`POST /api/smart-report/analyze\`

基于销售指标和规则阈值，触发规则引擎 + AI 运营诊断，返回诊断结论和运营建议。

---

## 请求信息

| 项目 | 内容 |
|------|------|
| **请求 URL** | \`POST /api/smart-report/analyze\` |
| **Content-Type** | \`application/json\` |
| **接口路径** | \`CommonController#analyzeSmartReport\` |

---

## 请求参数

### SmartReportRequestDTO

| 字段 | 类型 | 必填 | 默认值 | 描述 |
|------|------|------|--------|------|
| \`reportDate\` | \`LocalDate\` | 否 | 当天 | 报告日期，格式 \`yyyy-MM-dd\` |
| \`todayRevenue\` | \`BigDecimal\` | 是 | — | 当天销售额（元），≥ 0 |
| \`yesterdayRevenue\` | \`BigDecimal\` | 是 | — | 昨日销售额（元），≥ 0 |
| \`todayOrders\` | \`Integer\` | 是 | — | 当天订单量，≥ 0 |
| \`yesterdayOrders\` | \`Integer\` | 是 | — | 昨日订单量，≥ 0 |
| \`todayRisingLinks\` | \`Integer\` | 是 | — | 今日销量上涨链接数，≥ 0 |
| \`yesterdayRisingLinks\` | \`Integer\` | 是 | — | 昨日销量上涨链接数，≥ 0 |
| \`todayFallingLinks\` | \`Integer\` | 是 | — | 今日销量下跌链接数，≥ 0 |
| \`yesterdayFallingLinks\` | \`Integer\` | 是 | — | 昨日销量下跌链接数，≥ 0 |
| \`todayNoOrderLinks\` | \`Integer\` | 是 | — | 今日未出单链接数，≥ 0 |
| \`yesterdayNoOrderLinks\` | \`Integer\` | 是 | — | 昨日未出单链接数，≥ 0 |

### 规则阈值参数（可选）

| 字段 | 类型 | 默认值 | 描述 |
|------|------|--------|------|
| \`r1Threshold\` | \`BigDecimal\` | 20 | 销售额暴跌阈值（%），触发红色预警 |
| \`r2Threshold\` | \`BigDecimal\` | 30 | 大量链接滞销占比阈值（%），触发红色预警 |
| \`y1Threshold\` | \`BigDecimal\` | 10 | 销售额小幅下滑阈值（%），触发黄色预警 |
| \`y2Ratio\` | \`BigDecimal\` | 2 | 下跌/上涨倍数，触发黄色预警 |
| \`g1Threshold\` | \`BigDecimal\` | 10 | 销售额增长阈值（%），触发绿色提示 |
| \`g2Threshold\` | \`BigDecimal\` | 40 | 上涨链接占比阈值（%），触发绿色提示 |

---

## 规则引擎

### 🔴 红色预警（需立即关注）

| 规则 | 条件 |
|------|------|
| 销售额大幅下滑预警 | 销售额变化为 **负**，且下滑幅度 **≥ r1Threshold** |
| 大量链接滞销预警 | 今日未出单链接占比 **≥ r2Threshold** |

### 🟡 黄色预警（值得注意）

| 规则 | 条件 |
|------|------|
| 销售额下滑关注 | 销售额变化为 **负**，下滑幅度 **≥ y1Threshold** 且 **< r1Threshold** |
| 链接下跌趋势明显 | 今日下跌链接数 **>** 今日上涨链接数 **× y2Ratio** |
| 存在滞销链接 | 今日未出单链接数 **≥ 1** 且未达红色阈值 |

### 🟢 绿色提示（运营亮点）

| 规则 | 条件 |
|------|------|
| 销售额稳步增长 | 销售额变化 **≥ g1Threshold** |
| 多链接表现亮眼 | 今日上涨链接占比 **≥ g2Threshold** |

## 处理流程

1. 接收请求参数，应用默认阈值
2. 调用 AI 生成诊断结论（按规则判断红/黄/绿级别）
3. 调用 AI 生成运营诊断（核心结论、业务本质、多维度评估、亮点、风险预警、运营建议）
4. 解析 AI 返回的结构化文本，填充到 \`SmartReportResultVO\\\`
5. 返回统一封装结果

> **降级策略**：当 AI 调用失败时，自动降级为本地规则引擎（\`evaluateFallbackRules\`），基于阈值规则生成诊断结论和结构化运营诊断模板。
