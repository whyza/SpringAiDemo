        const markdownContent = `# 智能报告分析接口

\`POST /api/smart-report/analyze\`

基于销售指标和规则阈值，触发规则引擎 + AI 运营诊断，返回诊断结论和运营建议。

---

## 请求信息

| 项目 | 内容 |
|------|------|
| **请求 URL** | \`POST /api/smart-report/analyze\` |
| **Content-Type** | \`application/json\` |
| **接口路径** | \`CommonController#analyzeSmartReport\` |

---

## 请求参数

### SmartReportRequestDTO

| 字段 | 类型 | 必填 | 默认值 | 描述 |
|------|------|------|--------|------|
| \`reportDate\` | \`LocalDate\` | 否 | 当天 | 报告日期，格式 \`yyyy-MM-dd\` |
| \`todayRevenue\` | \`BigDecimal\` | 是 | — | 当天销售额（元），≥ 0 |
| \`yesterdayRevenue\` | \`BigDecimal\` | 是 | — | 昨日销售额（元），≥ 0 |
| \`todayOrders\` | \`Integer\` | 是 | — | 当天订单量，≥ 0 |
| \`yesterdayOrders\` | \`Integer\` | 是 | — | 昨日订单量，≥ 0 |
| \`todayRisingLinks\` | \`Integer\` | 是 | — | 今日销量上涨链接数，≥ 0 |
| \`yesterdayRisingLinks\` | \`Integer\` | 是 | — | 昨日销量上涨链接数，≥ 0 |
| \`todayFallingLinks\` | \`Integer\` | 是 | — | 今日销量下跌链接数，≥ 0 |
| \`yesterdayFallingLinks\` | \`Integer\` | 是 | — | 昨日销量下跌链接数，≥ 0 |
| \`todayNoOrderLinks\` | \`Integer\` | 是 | — | 今日未出单链接数，≥ 0 |
| \`yesterdayNoOrderLinks\` | \`Integer\` | 是 | — | 昨日未出单链接数，≥ 0 |

### 规则阈值参数（可选）

| 字段 | 类型 | 默认值 | 描述 |
|------|------|--------|------|
| \`r1Threshold\` | \`BigDecimal\` | 20 | 销售额大幅下滑阈值（%），触发红色 R1 |
| \`r2Threshold\` | \`BigDecimal\` | 30 | 大量链接下跌阈值（%），触发红色 R2 |
| \`r3Threshold\` | \`BigDecimal\` | 30 | 大量链接未出单阈值（%），触发红色 R3 |
| \`y1Threshold\` | \`BigDecimal\` | 10 | 销售额小幅下滑阈值（%），触发黄色 Y1 |
| \`g1Threshold\` | \`BigDecimal\` | 10 | 销售额增长阈值（%），触发绿色 G1 |
| \`g2Threshold\` | \`BigDecimal\` | 40 | 上涨链接占比阈值（%），触发绿色 G2 |

---

## 规则引擎

### 🔴 红色预警（需立即关注）

| 规则 | 条件 | 优先级 |
|------|------|--------|
| R1 销售额大幅下滑 | 当天销售额环比昨日下降幅度 **≥ r1Threshold** | 最高 |
| R2 大量链接下跌 | 当天下跌链接数 **≥** 当天总链接数 **× r2Threshold%** | 最高 |
| R3 大量链接未出单 | 当天未出单链接数 **≥** 当天总链接数 **× r3Threshold%** | 最高 |

### 🟡 黄色预警（值得注意）

| 规则 | 条件 | 优先级 |
|------|------|--------|
| Y1 销售额小幅下滑 | 当天销售额环比昨日下降幅度 **≥ y1Threshold** 且 **< r1Threshold** | 中 |
| Y2 部分链接下跌 | 当天未出单链接占比 **< r2Threshold**（与 R2 互斥，自动联动） | 中 |
| Y3 部分链接未出单 | 当天未出单链接占比 **< r3Threshold**（与 R3 互斥，自动联动） | 低 |

### 🟢 绿色提示（运营亮点）

| 规则 | 条件 |
|------|------|
| G1 销售额稳步增长 | 当天销售额相较昨日增长幅度 **≥ g1Threshold** |
| G2 上涨链接占比亮眼 | 当天上涨链接数占当天总链接数比例 **≥ g2Threshold** |

## 处理流程

1. 接收请求参数，应用默认阈值
2. 调用 AI 生成诊断结论（按红/黄/绿规则判断级别）
3. 调用 AI 生成运营诊断（① 整体表现 → ② 链接结构分析 → ③ 异常逻辑判断 → ④ 运营建议）
4. 解析 AI 返回的编号结构化文本（①②③④），填充到 \`SmartReportResultVO\`
5. 返回统一封装结果

> **降级策略**：当 AI 调用失败时，自动降级为本地规则引擎（\`evaluateFallbackRules\`），基于阈值规则生成诊断结论和结构化运营诊断模板。
`;
